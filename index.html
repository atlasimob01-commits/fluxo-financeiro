<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo Financeiro Sharks</title>

    <meta name="theme-color" content="#0a0a0a">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>FLUXO FINANCEIRO SHARKS</h1>
        <p>Feito por Atlas</p>
    </header>

    <section class="card">

        <h2>Dados da Compra</h2>

        <div class="campo">
            <label>Valor do Imóvel</label>
            <input id="valorImovel" type="text" inputmode="numeric">
        </div>

        <div class="campo">
            <label>Renda Bruta</label>
            <input id="renda" type="text" inputmode="numeric">
        </div>

        <div class="campo">
            <label>ATO</label>
            <input id="ato" type="text" inputmode="numeric">
        </div>

        <div class="campo">
            <label>FGTS</label>
            <input id="fgts" type="text" inputmode="numeric">
        </div>

        <div class="campo">
            <label>Parcelas da Entrada</label>
            <input id="parcelas" type="number" min="1">
        </div>

        <div class="campo">
            <label>Anuais (valor total)</label>
            <input id="anuaisValor" type="text" inputmode="numeric">
        </div>

        <div class="campo">
            <label>Quantidade de Anuais</label>
            <input id="anuaisVezes" type="number" min="1">
        </div>

    </section>

    <section class="card resultado">

        <h2>Resultado</h2>

        <div class="resultado-grid">

            <div class="box">
                <span>Faixa MCMV</span>
                <strong id="faixa">-</strong>
            </div>

            <div class="box">
                <span>Financiado</span>
                <strong id="financiado">R$ 0,00</strong>
                <small id="percFinanciadoSmall"></small>
            </div>

            <div class="box">
                <span>Entrada</span>
                <strong id="entrada">R$ 0,00</strong>
                <small id="percEntradaSmall"></small>
            </div>

            <div class="box">
                <span>Restante</span>
                <strong id="restante">R$ 0,00</strong>
            </div>

            <div class="box destaque">
                <span>Parcela</span>
                <strong id="valorParcela">R$ 0,00</strong>
                <small id="parcelasSmall"></small>
            </div>

            <div class="box">
                <span>Anuais</span>
                <strong id="anuaisResumo">R$ 0,00</strong>
                <small id="anuaisDetalhe">0x</small>
            </div>

        </div>

        <div class="barra">
            <div id="barraFinanciamento"></div>
        </div>

        <div class="textoBarra">
            <span id="textoBarra">0%</span>
        </div>

        <!-- BOTÕES -->
        <div class="acoes">
            <button id="btnImprimir" type="button">
                🖨️ Imprimir Simulação
            </button>
        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
